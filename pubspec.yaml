name: pulse_edge
description: Offline cardiac risk monitoring app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Use with the CupertinoIcons class   
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1

  # Sensors
  sensors_plus: ^4.0.2

  # Background Execution
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2

  # Live Chart
  fl_chart: ^0.66.0

  # TFLite On-Device Inference
  tflite_flutter: ^0.10.4

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Alerts
  vibration: ^1.8.4
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/audio/
    - assets/images/
